name: Publish candidate campaign

on:
  push:
    branches: [main]
    paths:
      - '.bootstrap/READY'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble campaign package
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/part-* > /tmp/campaign.b64
          base64 --decode /tmp/campaign.b64 > /tmp/campaign.tar.gz
          tar -xzf /tmp/campaign.tar.gz -C .
          python scripts/generate_pdfs.py
          rm -rf .bootstrap
      - name: Commit complete campaign
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Publish global manufacturing candidate campaign"
            git push
          fi
